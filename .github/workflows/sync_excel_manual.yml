name: Sincronización Manual a Excel

on:
  workflow_dispatch:

jobs:
  sync_excel:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r legacy_python/requirements_bot.txt

      - name: Ejecutar contabilidad (Excel)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python legacy_python/contabilidad.py
