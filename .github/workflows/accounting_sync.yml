name: Sincronización de Contabilidad

on:
  # Se ejecuta automáticamente cada 5 minutos (Plan PRO de API-Football)
  schedule:
    - cron: '*/5 * * * *'
  
  # Permite ejecutar el bot manualmente desde un botón en la página web de GitHub
  workflow_dispatch:

jobs:
  sincronizar_finanzas:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar el código del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Instalar Librerías del Robot
        run: |
          python -m pip install --upgrade pip
          pip install -r legacy_python/requirements_bot.txt
          
      - name: ⚽ Actualizar Radar Tricolor (API-Football)
        env:
          # Inyectamos el JSON secreto de Firebase
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          # Inyectamos la clave secreta de API-Football
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python legacy_python/fetch_matches.py

      - name: 🚀 Ejecutar Cerebro Contable
        env:
          # Inyectamos el JSON secreto desde la configuración de GitHub
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python legacy_python/contabilidad.py

      - name: 🕵🏻‍♂️ Ejecutar Auditor de Apuestas
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python legacy_python/auditor.py
